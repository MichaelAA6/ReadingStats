{% extends "base.html" %}
{% block title %}Goalkeepers{% endblock %}
{% block content %}
<h1>Goalkeepers</h1>

<hr/>
<h2>Discipline</h2>

      vegaEmbed('#cards-chart', cardSpec);
    </script>
{% endblock %}
