{% extends "base.html" %}
{% block title %}Goalkeepers{% endblock %}
{% block content %}
<h1>Goalkeepers</h1>
<h2>Appearances</h2>
<div id="apps-chart"></div>
<hr/>
<h2>Discipline</h2>
<div id="cards-chart"></div>
<hr/>
<h2>Goals Conceded</h2>
<div id="conceded-chart"></div>
    <script type="text/javascript">
      const appsSpec = {{ apps_graph | safe }}
      vegaEmbed('#apps-chart', appsSpec);
      const cardSpec = {{ card_graph | safe }}
      vegaEmbed('#cards-chart', cardSpec);
      const conSpec = {{conceded_graph | safe}}
      vegaEmbed('#conceded-chart',conSpec)
    </script>
{% endblock %}
