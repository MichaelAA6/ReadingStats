{% extends "base.html" %}
{% block title %}Midfielders - Reading Stats{% endblock %}
{% block content %}
<h1>Midfielders</h1>
<nav class="navbar bg-light">
    <div class="container">
        <a class="navbar-brand" href="/midfielders">25/26 Season</a>
        <a class="navbar-brand" href="/midfielders/2425season">24/25 Season</a>
    </div>
</nav>
<h2>Appearances</h2>
<div id="apps-chart"></div>
<hr/>
<h2>Goals and Assists</h2>
<div id="ga-chart"></div>
<hr/>
<h2> Discipline</h2>
<div id="card-chart"></div>
<hr/>
<h2>Crossing</h2>
<div id="cross-chart"></div>
<script type="text/javascript">
      vegaEmbed('#apps-chart',"{{ url_for('static', filename='jsons/midfielders/' ~ season ~ '/apps.json') }}" );
      vegaEmbed('#ga-chart',"{{ url_for('static', filename='jsons/midfielders/' ~ season ~ '/ga.json') }}"  );
      vegaEmbed('#card-chart',"{{ url_for('static', filename='jsons/midfielders/' ~ season ~ '/cards.json') }}" )
      vegaEmbed('#cross-chart',"{{ url_for('static', filename='jsons/midfielders/' ~ season ~ '/cross.json') }}" )
    </script>

{% endblock %}
